services:
  postgres:
    image: postgres:16-alpine
    container_name: insurance-management-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - insurance-management-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-insurance_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: insurance-management-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - insurance-management-pgadmin-data:/var/lib/pgadmin

volumes:
  insurance-management-postgres-data:
  insurance-management-pgadmin-data:
