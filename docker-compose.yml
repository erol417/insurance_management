services:
  postgres:
    image: postgres:16-alpine
    container_name: insurance-management-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - insurance-management-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-insurance_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: insurance-management-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - insurance-management-pgadmin-data:/var/lib/pgadmin

  app:
    build:
      context: .
      dockerfile: InsuranceManagement.Web/Dockerfile
    container_name: insurance-management-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Persistence__Provider=Postgres
      - ConnectionStrings__DefaultConnection=Host=insurance-management-db;Port=5432;Database=insurance_management;Username=postgres;Password=postgres;Include Error Detail=true
    env_file:
      - .env

volumes:
  insurance-management-postgres-data:
  insurance-management-pgadmin-data:
